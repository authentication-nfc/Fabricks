<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fixed Viewer</title>
    <style>
        @font-face {
            font-family: 'Archia-Regular';
            src: url('Archia-Regular.BsKxFEMw.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; background-color: #000; overflow-x: hidden; }
        .scrolling-wrapper {
            position: relative;
            width: 100%;
            max-width: 1500px;
            margin: 0 auto;
            height: 733.33vw; 
            background: url('long-background.jpg') no-repeat top center;
            background-size: 100% auto;
            overflow: hidden; 
        }
        #viewer-container {
            position: absolute;
            top: 19%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 2000px;
            height: auto;
            max-height: 80vh;
            touch-action: pan-y;
            cursor: ew-resize;
            z-index: 10;
            border: 2px solid #94F6FC;
            border-radius: 20px;
            overflow: hidden;
            display: block;
            background-color: rgb(148, 246, 252); 
        }
        #product-image { 
            width: 100%; 
            height: auto;
            display: block;
            pointer-events: none; 
        }
        .overlay-number {
            position: absolute;
            top: 5%;
            left: 5%;
            z-index: 100;
            pointer-events: none;
            font-family: 'Archia-Regular', sans-serif;
            font-size: 80px;
            line-height: 1;
            color: transparent;
            -webkit-text-stroke: 1.5px #ffffff;
            opacity: 0.8;
        }
        .overlay-image-layer {
            position: absolute;
            top: 86%;
            right: -6%;
            width: 120px;
            height: auto;
            z-index: 100;
            pointer-events: none;
            opacity: 0.8;
        }
        .fabricks-link { position: absolute; left: 42%; transform: translateX(-50%); z-index: 20; top: -0.25%; }
        .fabricks-link img { width: 160px; height: auto; border: none; }
    </style>
</head>
<body>
    <div class="scrolling-wrapper">
        <div id="viewer-container">
            <img id="product-image" src="image_01.jpg">
            <div class="overlay-number">8</div>
            <img src="your-logo.png" class="overlay-image-layer">
        </div>
        <div class="fabricks-link">
            <a href="https://fabricks.com/" target="_blank">
                <img src="button.png" alt="">
            </a>
        </div>
    </div>
    <script>
        const imgElement = document.getElementById('product-image');
        const images = ['image_01.jpg', 'image_02.jpg'];
        images.forEach(src => { new Image().src = src; });

        let currentFrameIndex = 0;
        let isDragging = false;
        let startX = 0;
        let hasSwitched = false; // 1回のドラッグで何度も切り替わらないためのフラグ

        const updateFrame = (deltaX) => {
            const threshold = 50; // 50px動いたら切り替える
            
            // 絶対値（動きの大きさ）がしきい値を超えたかチェック
            if (Math.abs(deltaX) > threshold && !hasSwitched) {
                // 現在が0なら1に、1なら0に入れ替える
                currentFrameIndex = currentFrameIndex === 0 ? 1 : 0;
                imgElement.src = images[currentFrameIndex];
                hasSwitched = true; // 指を離すまで次の切り替えをブロック
            }
        };

        const start = (x) => { 
            isDragging = true; 
            startX = x; 
            hasSwitched = false; // ドラッグ開始時にフラグをリセット
        };
        
        const move = (x) => { 
            if (!isDragging) return; 
            updateFrame(x - startX); 
        };
        
        const end = () => { 
            isDragging = false; 
        };

        const container = document.getElementById('viewer-container');
        container.addEventListener('mousedown', (e) => start(e.pageX));
        window.addEventListener('mousemove', (e) => move(e.pageX));
        window.addEventListener('mouseup', end);
        container.addEventListener('touchstart', (e) => start(e.touches[0].pageX), { passive: true });
        container.addEventListener('touchmove', (e) => move(e.touches[0].pageX), { passive: true });
        window.addEventListener('touchend', end);
    </script>
</body>
</html>
